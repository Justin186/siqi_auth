# ============================================================
# Siqi Auth - Slave 节点部署编排
# 包含:
#   1) MySQL Slave（对外端口 8002）
#   2) Auth Agent（对外端口 8001）
#
# 说明:
# - 本文件用于业务节点（从节点）
# - 需先准备 slave_init.sql（来自 master 的快照）
# - 多台从节点部署时，SERVER_ID 必须唯一
# ============================================================

services:
  # -----------------------------
  # MySQL Slave
  # -----------------------------
  mysql-slave:
    image: mysql:8.0
    container_name: siqi_mysql_slave
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: siqi_auth
      MYSQL_USER: siqi_dev
      MYSQL_PASSWORD: siqi123
    ports:
      # 本机对外 8002 -> 容器 3306
      - "8002:3306"
    command:
      # 从库 server-id，默认 2；多机部署请确保唯一（如 2/3/4...）
      - --server-id=${SERVER_ID:-2}
      - --relay-log=relay-bin
      # 从库保留 binlog 便于后续扩展链路
      - --log-bin=mysql-bin
      - --binlog-format=ROW
      # 从库只读
      - --read-only=1
      # 跳过常见初始化冲突错误（按项目原策略保留）
      - --slave-skip-errors=1050,1146,1396
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      # 首次初始化导入主库快照
      - ./slave_init.sql:/docker-entrypoint-initdb.d/init.sql
      # 持久化从库数据
      - mysql_slave_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "-proot123"]
      interval: 5s
      timeout: 3s
      retries: 30
    networks:
      - siqi_net

  # -----------------------------
  # Auth Agent
  # -----------------------------
  auth-agent:
    # 生产可改为使用预构建镜像
    # image: siqi/auth-agent:latest
    build:
      context: .
      dockerfile: deploy/Dockerfile.agent
      network: host
      args:
        - HTTP_PROXY
        - HTTPS_PROXY
    container_name: siqi_auth_agent
    restart: always
    depends_on:
      mysql-slave:
        condition: service_healthy
    ports:
      - "8001:8001"
    command:
      - --port=8001
      # 容器内互联，直接使用 mysql-slave 服务名
      - --db_host=mysql-slave
      - --db_port=3306
      - --db_user=siqi_dev
      - --db_password=siqi123
      - --db_name=siqi_auth
    networks:
      - siqi_net

networks:
  siqi_net:
    driver: bridge

volumes:
  mysql_slave_data:
